name: "➕ New official resource"
description: Suggest an official ALLEN resource to add.
title: "[new] "
labels: ["new-resource"]
body:
  - type: input
    id: name
    attributes:
      label: Resource name
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Official URL
    validations:
      required: true
  - type: textarea
    id: why-official
    attributes:
      label: How do you know it's official?
      placeholder: e.g. linked from allen.in, verified handle, app-store publisher "ALLEN"
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Website / portal
        - Mobile app
        - YouTube / social channel
        - Study material
        - Scholarship / admission test
        - Support / contact
        - Other
  - type: input
    id: region
    attributes:
      label: Region (if specific)
      placeholder: e.g. Tamil Nadu, Kota, Pan-India
