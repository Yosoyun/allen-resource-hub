<title>ALLEN Resource Hub · All official ALLEN links in one place</title>
<meta name="description" content="A clean, bilingual (English / हिन्दी) guide to every official ALLEN Career Institute website, app, YouTube channel, social media handle, free study material and helpline — made simple for students and parents." />
<meta name="theme-color" content="#0e2a5e" />

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --brand:#0e2a5e;        /* ALLEN-style deep royal blue */
    --brand-2:#1b4aa0;
    --brand-tint:#eaf0fb;
    --accent:#ff7a18;       /* warm saffron */
    --accent-soft:#fff1e6;
    --gold:#f5b301;
    --ink:#0d1b30;
    --muted:#5a6a82;
    --line:#e6ebf3;
    --bg:#f6f8fc;
    --card:#ffffff;
    --ok:#13a36b;
    --ok-soft:#e7f7ef;
    --shadow:0 1px 2px rgba(13,27,48,.04), 0 8px 28px rgba(13,27,48,.06);
    --shadow-lg:0 12px 40px rgba(14,42,94,.16);
    --r:16px;
    --r-sm:11px;
    --maxw:1140px;
    --font:"Plus Jakarta Sans", "Noto Sans Devanagari", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  html[lang="hi"]{ --font:"Noto Sans Devanagari","Plus Jakarta Sans", system-ui, sans-serif; }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0; font-family:var(--font); color:var(--ink); background:var(--bg);
    -webkit-font-smoothing:antialiased; line-height:1.5; font-size:16px;
  }
  a{ color:inherit; text-decoration:none; }
  img{ max-width:100%; }
  .wrap{ width:100%; max-width:var(--maxw); margin:0 auto; padding:0 22px; }
  .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }

  /* ---------- Header ---------- */
  header.site{
    position:sticky; top:0; z-index:50;
    background:rgba(246,248,252,.82); backdrop-filter:saturate(160%) blur(12px);
    border-bottom:1px solid var(--line);
  }
  .bar{ display:flex; align-items:center; gap:16px; height:66px; }
  .brand{ display:flex; align-items:center; gap:11px; font-weight:800; letter-spacing:-.02em; }
  .brand .logo{
    width:38px; height:38px; border-radius:10px; flex:none;
    background:linear-gradient(135deg,var(--brand),var(--brand-2));
    color:#fff; display:grid; place-items:center; font-size:13px; font-weight:800;
    box-shadow:0 6px 16px rgba(14,42,94,.28);
  }
  .brand .name{ font-size:17px; line-height:1.05; }
  .brand .name small{ display:block; font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.01em; }
  .bar .spacer{ flex:1; }
  .lang-switch{ display:inline-flex; background:#fff; border:1px solid var(--line); border-radius:999px; padding:3px; box-shadow:var(--shadow); }
  .lang-switch button{
    border:0; background:transparent; cursor:pointer; font-family:inherit; font-weight:700; font-size:13px;
    color:var(--muted); padding:7px 13px; border-radius:999px; transition:.18s;
  }
  .lang-switch button[aria-pressed="true"]{ background:var(--brand); color:#fff; }
  .btn-share{
    display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line); background:#fff;
    color:var(--brand); font-weight:700; font-size:13px; padding:9px 14px; border-radius:999px; cursor:pointer;
    font-family:inherit; box-shadow:var(--shadow); transition:.18s;
  }
  .btn-share:hover{ border-color:var(--brand); transform:translateY(-1px); }

  /* ---------- Hero ---------- */
  .hero{ position:relative; overflow:hidden; padding:48px 0 30px; }
  .hero::before{
    content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(680px 320px at 12% -10%, rgba(27,74,160,.16), transparent 60%),
      radial-gradient(560px 300px at 100% 0%, rgba(255,122,24,.13), transparent 58%);
  }
  .hero .wrap{ position:relative; z-index:1; }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line);
    color:var(--brand); font-weight:700; font-size:12.5px; padding:6px 13px; border-radius:999px; box-shadow:var(--shadow);
  }
  .eyebrow .dot{ width:7px; height:7px; border-radius:50%; background:var(--ok); box-shadow:0 0 0 4px var(--ok-soft); }
  h1.title{ font-size:clamp(30px,4.6vw,50px); line-height:1.05; letter-spacing:-.03em; margin:18px 0 14px; max-width:18ch; }
  h1.title .hl{ color:var(--brand); position:relative; }
  h1.title .hl::after{ content:""; position:absolute; left:0; right:0; bottom:.06em; height:.28em; background:var(--accent-soft); z-index:-1; border-radius:4px; }
  .lede{ font-size:clamp(16px,1.9vw,19px); color:var(--muted); max-width:60ch; margin:0 0 24px; }

  /* search */
  .search{ position:relative; max-width:560px; }
  .search svg{ position:absolute; left:16px; top:50%; transform:translateY(-50%); width:20px; height:20px; color:var(--muted); }
  .search input{
    width:100%; font-family:inherit; font-size:16px; color:var(--ink);
    padding:15px 16px 15px 48px; border:1.5px solid var(--line); border-radius:14px; background:#fff; box-shadow:var(--shadow);
    transition:.18s;
  }
  .search input:focus{ outline:none; border-color:var(--brand); box-shadow:0 0 0 4px var(--brand-tint); }

  /* quick paths */
  .paths{ display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
  .path{
    display:inline-flex; align-items:center; gap:9px; background:#fff; border:1px solid var(--line); cursor:pointer;
    font-family:inherit; font-weight:700; font-size:14px; color:var(--ink); padding:10px 15px; border-radius:12px; box-shadow:var(--shadow);
    transition:.16s;
  }
  .path:hover{ transform:translateY(-2px); border-color:var(--brand-2); box-shadow:var(--shadow-lg); }
  .path .emoji{ font-size:18px; }

  .stats{ display:flex; flex-wrap:wrap; gap:26px; margin-top:30px; }
  .stat .n{ font-size:24px; font-weight:800; color:var(--brand); letter-spacing:-.02em; }
  .stat .l{ font-size:13px; color:var(--muted); font-weight:600; }

  /* ---------- Controls / filters ---------- */
  .controls{ position:sticky; top:66px; z-index:40; background:rgba(246,248,252,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:12px 0; }
  .filters{ display:flex; flex-wrap:wrap; gap:16px; align-items:center; }
  .fgroup{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .fgroup .flabel{ font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
  .chip{
    border:1px solid var(--line); background:#fff; color:var(--ink); font-family:inherit; font-weight:600; font-size:13px;
    padding:7px 13px; border-radius:999px; cursor:pointer; transition:.15s; white-space:nowrap;
  }
  .chip:hover{ border-color:var(--brand-2); }
  .chip[aria-pressed="true"]{ background:var(--brand); border-color:var(--brand); color:#fff; }
  .chip.stream[aria-pressed="true"]{ background:var(--accent); border-color:var(--accent); }

  /* ---------- Section nav ---------- */
  .secnav{ display:flex; gap:8px; overflow-x:auto; padding:14px 0 2px; -ms-overflow-style:none; scrollbar-width:none; }
  .secnav::-webkit-scrollbar{ display:none; }
  .secnav a{ flex:none; font-size:13px; font-weight:700; color:var(--muted); padding:8px 14px; border-radius:999px; border:1px solid var(--line); background:#fff; transition:.15s; }
  .secnav a:hover{ color:var(--brand); border-color:var(--brand-2); }

  /* ---------- Sections & cards ---------- */
  main{ padding:26px 0 60px; }
  .section{ margin:30px 0 8px; scroll-margin-top:150px; }
  .section-head{ display:flex; align-items:flex-start; gap:14px; margin-bottom:16px; }
  .section-head .ic{ font-size:26px; line-height:1; width:48px; height:48px; flex:none; display:grid; place-items:center; background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); }
  .section-head h2{ font-size:22px; letter-spacing:-.02em; margin:2px 0 3px; }
  .section-head p{ margin:0; color:var(--muted); font-size:14.5px; max-width:70ch; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }

  .card{
    position:relative; display:flex; flex-direction:column; gap:10px; background:var(--card);
    border:1px solid var(--line); border-radius:var(--r); padding:18px; box-shadow:var(--shadow);
    transition:transform .16s, box-shadow .16s, border-color .16s;
  }
  .card:hover{ transform:translateY(-3px); box-shadow:var(--shadow-lg); border-color:#d4ddec; }
  .card .top{ display:flex; align-items:center; gap:12px; }
  .card .pic{
    width:42px; height:42px; flex:none; border-radius:11px; display:grid; place-items:center;
    background:var(--brand-tint); color:var(--brand);
  }
  .card .pic svg{ width:22px; height:22px; }
  .card h3{ font-size:16px; margin:0; letter-spacing:-.01em; line-height:1.2; }
  .card .plat{ font-size:11.5px; color:var(--muted); font-weight:600; text-transform:capitalize; }
  .card .desc{ font-size:14px; color:#33425c; margin:0; }
  .card .how{ font-size:12.5px; color:var(--muted); display:flex; gap:7px; align-items:flex-start; }
  .card .how b{ color:var(--brand); font-weight:700; flex:none; }
  .card .tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:2px; }
  .tag{ font-size:11px; font-weight:700; color:var(--brand); background:var(--brand-tint); padding:3px 9px; border-radius:999px; }
  .tag.s{ color:#b8540a; background:var(--accent-soft); }
  .card .foot{ display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:10px; }
  .badge{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:4px 9px; border-radius:999px; }
  .badge.ok{ color:var(--ok); background:var(--ok-soft); }
  .badge.official{ color:var(--brand-2); background:var(--brand-tint); }
  .open{ display:inline-flex; align-items:center; gap:6px; font-weight:700; font-size:13.5px; color:var(--brand); }
  .card:hover .open{ gap:9px; }
  .card.guide{ background:linear-gradient(180deg,#fff, #fbfcff); border-color:#dfe7f5; }
  .card.guide .pic{ background:var(--accent-soft); color:var(--accent); }

  .empty{ text-align:center; padding:60px 20px; color:var(--muted); }
  .empty .e{ font-size:40px; }

  /* notice */
  .notice{ display:flex; gap:12px; align-items:flex-start; background:#fff; border:1px solid var(--line); border-left:4px solid var(--gold); border-radius:12px; padding:14px 16px; margin:22px 0 0; box-shadow:var(--shadow); }
  .notice .i{ font-size:18px; }
  .notice p{ margin:0; font-size:13.5px; color:var(--muted); }

  /* ---------- Footer ---------- */
  footer.site{ border-top:1px solid var(--line); background:#fff; padding:34px 0 60px; }
  footer .cols{ display:flex; flex-wrap:wrap; gap:30px; justify-content:space-between; }
  footer .disc{ max-width:62ch; font-size:13px; color:var(--muted); }
  footer .disc strong{ color:var(--ink); }
  footer .meta{ font-size:12.5px; color:var(--muted); }

  /* back to top */
  .totop{ position:fixed; right:20px; bottom:20px; z-index:60; width:46px; height:46px; border-radius:14px; border:1px solid var(--line);
    background:var(--brand); color:#fff; display:grid; place-items:center; cursor:pointer; box-shadow:var(--shadow-lg); opacity:0; transform:translateY(12px); transition:.2s; }
  .totop.show{ opacity:1; transform:none; }

  @media (max-width:640px){
    .bar{ height:60px; gap:10px; }
    .brand .logo{ width:34px; height:34px; }
    .brand .name{ font-size:14.5px; white-space:nowrap; }
    .brand .name small{ display:none; }
    .btn-share span{ display:none; }
    .hero{ padding:32px 0 22px; }
    .controls{ top:60px; }
    .secnav{ display:none; }
    .grid{ grid-template-columns:1fr; }
  }
  @media (prefers-reduced-motion:reduce){ *{ transition:none!important; scroll-behavior:auto; } }
</style>
</head>

function applyStaticI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.innerHTML = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-attr]').forEach(el=>{
    el.getAttribute('data-i18n-attr').split(';').forEach(pair=>{
      const [attr,key]=pair.split(':'); el.setAttribute(attr.trim(), t(key.trim()));
    });
  });
  document.documentElement.lang = state.lang;
  document.getElementById('reviewed').textContent = window.CATALOG.last_reviewed || '—';
}

function renderPaths(){
  const box=document.getElementById('paths'); box.innerHTML='';
  t('paths').forEach(p=>{
    const b=document.createElement('button'); b.className='path';
    b.innerHTML=`<span class="emoji">${p.emoji}</span> ${p.label}`;
    b.onclick=()=>{
      if(p.stream){ state.stream=p.stream; state.audience='all'; }
      if(p.aud){ state.audience=p.aud; state.stream='all'; }
      renderFilters(); renderSections();
      document.querySelector('.controls').scrollIntoView({behavior:'smooth',block:'start'});
    };
    box.appendChild(b);
  });
}

function renderStats(){
  const total = window.CATALOG.sections.filter(s=>s.id!=='start-here').reduce((a,s)=>a+s.items.length,0);
  const box=document.getElementById('stats'); box.innerHTML='';
  const data=[ [total+'+', t('stat_links')], [Object.keys(UI).length, t('stat_langs')], [t('stat_freeVal'), t('stat_free')] ];
  data.forEach(([n,l])=>{ const d=document.createElement('div'); d.className='stat'; d.innerHTML=`<div class="n">${n}</div><div class="l">${l}</div>`; box.appendChild(d); });
}

function renderFilters(){
  const a=document.getElementById('audienceFilters'); a.innerHTML='';
  AUDS.forEach(v=>{ const b=document.createElement('button'); b.className='chip'; b.textContent=t('aud_'+v);
    b.setAttribute('aria-pressed', state.audience===v); b.onclick=()=>{ state.audience=v; renderFilters(); renderSections(); }; a.appendChild(b); });
  const s=document.getElementById('streamFilters'); s.innerHTML='';
  STREAMS.forEach(v=>{ const b=document.createElement('button'); b.className='chip stream'; b.textContent=t('st_'+v);
    b.setAttribute('aria-pressed', state.stream===v); b.onclick=()=>{ state.stream=v; renderFilters(); renderSections(); }; s.appendChild(b); });
}

function matchItem(it){
  if(state.audience!=='all' && !(it.audience||[]).includes(state.audience)) return false;
  if(state.stream!=='all' && !(it.streams||[]).includes(state.stream) && !(it.streams||[]).includes('general')) return false;
  if(state.query){
    const q=state.query.toLowerCase();
    const hay=[it.name,it.platform,it['desc_'+state.lang],it.desc_en,it.url,(it.streams||[]).join(' ')].join(' ').toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}

function cardHTML(it, guide){
  const L=state.lang;
  const verified = it.verified===true;
  const badge = verified
    ? `<span class="badge ok">✓ ${t('verified')}</span>`
    : `<span class="badge official">● ${t('official')}</span>`;
  const tags = [
    ...(it.streams||[]).filter(s=>s!=='general').map(s=>`<span class="tag s">${t('st_'+s)||s}</span>`)
  ].join('');
  const how = it['how_'+L] ? `<p class="how"><b>${t('howLabel')}:</b> ${it['how_'+L]}</p>` : '';
  return `<a class="card${guide?' guide':''}" href="${it.url}" target="_blank" rel="noopener noreferrer">
    <div class="top">
      <span class="pic">${iconFor(it.platform)}</span>
      <div><h3>${it['name_'+L]||it.name}</h3><div class="plat">${PLAT[it.platform]||it.platform}</div></div>
    </div>
    <p class="desc">${it['desc_'+L]||it.desc_en||''}</p>
    ${how}
    ${tags?`<div class="tags">${tags}</div>`:''}
    <div class="foot">${badge}<span class="open">${t('open')} <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span></div>
  </a>`;
}

function renderSecNav(visibleIds){
  const nav=document.getElementById('secnav'); nav.innerHTML='';
  window.CATALOG.sections.forEach(s=>{
    if(!visibleIds.includes(s.id)) return;
    const a=document.createElement('a'); a.href='#'+s.id; a.textContent=`${s.icon} ${s['title_'+state.lang]||s.title_en}`; nav.appendChild(a);
  });
}

function renderSections(){
  const root=document.getElementById('sections'); root.innerHTML='';
  const visibleIds=[]; let anyShown=false;
  window.CATALOG.sections.forEach(s=>{
    const items=s.items.filter(matchItem);
    if(!items.length) return;
    anyShown=true; visibleIds.push(s.id);
    const guide = s.id==='start-here';
    const sec=document.createElement('section'); sec.className='section'; sec.id=s.id;
    sec.innerHTML=`<div class="section-head"><span class="ic">${s.icon}</span>
        <div><h2>${s['title_'+state.lang]||s.title_en}</h2><p>${s['blurb_'+state.lang]||s.blurb_en||''}</p></div></div>
      <div class="grid">${items.map(it=>cardHTML(it,guide)).join('')}</div>`;
    root.appendChild(sec);
  });
  if(!anyShown){
    root.innerHTML=`<div class="empty"><div class="e">🔍</div><h2>${t('emptyTitle')}</h2><p>${t('emptyBody')}</p>
      <button class="chip" onclick="resetFilters()">${t('clear')}</button></div>`;
  }
  renderSecNav(visibleIds);
}

function resetFilters(){ state.audience='all'; state.stream='all'; state.query=''; document.getElementById('search').value=''; renderFilters(); renderSections(); }

function setLang(l){
  state.lang=l; try{ localStorage.setItem('arh_lang', l); }catch(e){}
  document.querySelectorAll('.lang-switch button').forEach(b=>b.setAttribute('aria-pressed', b.dataset.lang===l));
  applyStaticI18n(); renderPaths(); renderStats(); renderFilters(); renderSections();
}

/* ---------- wire up ---------- */
document.querySelectorAll('.lang-switch button').forEach(b=> b.onclick=()=>setLang(b.dataset.lang));
document.getElementById('search').addEventListener('input', e=>{ state.query=e.target.value.trim(); renderSections(); });
document.getElementById('shareBtn').onclick = async ()=>{
  const url=location.href;
  try{
    if(navigator.share){ await navigator.share({title:'ALLEN Resource Hub', text:'All official ALLEN links in one place', url}); }
    else { await navigator.clipboard.writeText(url); toast(t('copied')); }
  }catch(e){}
};
function toast(msg){
  const el=document.createElement('div'); el.textContent=msg;
  el.style.cssText='position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--brand);color:#fff;padding:12px 18px;border-radius:12px;font-weight:600;font-size:14px;z-index:99;box-shadow:var(--shadow-lg)';
  document.body.appendChild(el); setTimeout(()=>el.remove(),2600);
}
const totop=document.getElementById('totop');
totop.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
addEventListener('scroll',()=>{ totop.classList.toggle('show', scrollY>500); });

/* ---------- init ---------- */
(function init(){
  let saved='en'; try{ saved=localStorage.getItem('arh_lang')||'en'; }catch(e){}
  setLang(UI[saved]?saved:'en');
})();
</script>
</body>
</html>
